services:
  redis:
    image: redis:7-alpine
    container_name: tobimarks-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      redis-server
      --maxmemory 50mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis-queue:
    image: redis:7-alpine
    container_name: tobimarks-redis-queue
    restart: unless-stopped
    ports:
      - '${REDIS_QUEUE_PORT:-6380}:6379'
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
    driver: local
  redis_queue_data:
    driver: local
